name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: localhost:5000

jobs:
  # ─────────────────────────────────────────────
  # STAGE 1: LINT
  # ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Lint Python (flake8)
        run: |
          flake8 api/main.py worker/worker.py \
            --max-line-length=120 \
            --extend-ignore=E501

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install eslint
        working-directory: frontend
        run: npm ci

      - name: Lint JavaScript (eslint)
        working-directory: frontend
        run: |
          npx eslint app.js \
            --no-eslintrc \
            --env node \
            --env es2021 \
            --parser-options "ecmaVersion:2021" \
            --rule "no-undef: error" \
            --rule "no-unused-vars: warn" 

      - name: Lint Dockerfiles (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile
          ignore: DL3018
          failure-threshold: warning

      - name: Lint worker Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile
          failure-threshold: warning

      - name: Lint frontend Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile
          failure-threshold: warning

  # ─────────────────────────────────────────────
  # STAGE 2: TEST
  # ─────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API dependencies + test tools
        run: |
          pip install -r api/requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run unit tests with coverage
        run: |
          cd api && pytest tests/ -v \
            --cov=. \
            --cov-report=xml:../coverage.xml \
            --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ─────────────────────────────────────────────
  # STAGE 3: BUILD
  # ─────────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: echo "sha=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            ${{ env.REGISTRY }}/api:${{ steps.meta.outputs.sha }}
            ${{ env.REGISTRY }}/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ${{ env.REGISTRY }}/worker:${{ steps.meta.outputs.sha }}
            ${{ env.REGISTRY }}/worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/frontend:${{ steps.meta.outputs.sha }}
            ${{ env.REGISTRY }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # STAGE 4: SECURITY SCAN
  # ─────────────────────────────────────────────
  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      # Rebuild images so they're available locally for Trivy
      - name: Build images for scanning
        run: |
          docker buildx build --load -t ${{ env.REGISTRY }}/api:latest ./api
          docker buildx build --load -t ${{ env.REGISTRY }}/worker:latest ./worker
          docker buildx build --load -t ${{ env.REGISTRY }}/frontend:latest ./frontend

      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.REGISTRY }}/api:latest"
          format: "sarif"
          output: "trivy-api.sarif"
          exit-code: "1"
          severity: "CRITICAL"
          ignore-unfixed: true

      - name: Scan Worker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.REGISTRY }}/worker:latest"
          format: "sarif"
          output: "trivy-worker.sarif"
          exit-code: "1"
          severity: "CRITICAL"
          ignore-unfixed: true

      - name: Scan Frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.REGISTRY }}/frontend:latest"
          format: "sarif"
          output: "trivy-frontend.sarif"
          exit-code: "1"
          severity: "CRITICAL"
          ignore-unfixed: true

      - name: Upload Trivy SARIF results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sarif-results
          path: "*.sarif"

  # ─────────────────────────────────────────────
  # STAGE 5: INTEGRATION TEST
  # ─────────────────────────────────────────────
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4

      - name: Create .env for compose
        run: |
          echo "REDIS_PASSWORD=testpassword" >> .env
          echo "APP_ENV=production" >> .env
          echo "FRONTEND_PORT=3000" >> .env

      - name: Start full stack
        run: docker compose up -d --build

      - name: Wait for all services to be healthy
        run: |
          echo "Waiting for services to become healthy..."
          for i in $(seq 1 30); do
            HEALTH=$(docker compose ps --format json | python3 -c "
          import sys, json
          services = [json.loads(l) for l in sys.stdin if l.strip()]
          unhealthy = [s['Service'] for s in services if s.get('Health') not in ('healthy', '')]
          print(','.join(unhealthy))
          ")
            if [ -z "$HEALTH" ]; then
              echo "All services healthy!"
              break
            fi
            echo "Waiting... unhealthy: $HEALTH"
            sleep 5
          done
          docker compose ps

      - name: Submit a job via frontend
        id: submit
        run: |
          JOB_RESPONSE=$(curl -sf -X POST http://localhost:3000/submit -H 'Content-Type: application/json')
          echo "Response: $JOB_RESPONSE"
          JOB_ID=$(echo "$JOB_RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])")
          echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"

      - name: Poll until job completes (max 30s)
        run: |
          JOB_ID="${{ steps.submit.outputs.job_id }}"
          for i in $(seq 1 15); do
            STATUS=$(curl -sf "http://localhost:3000/status/$JOB_ID" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))")
            echo "Attempt $i — status: $STATUS"
            if [ "$STATUS" = "completed" ]; then
              echo "Job completed successfully!"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: Job did not complete in time"
          docker compose logs
          exit 1

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  # ─────────────────────────────────────────────
  # STAGE 6: DEPLOY (main branch only)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy (Rolling Update)
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Create .env for deployment
        run: |
          echo "REDIS_PASSWORD=${REDIS_PASSWORD:-changeme}" >> .env
          echo "APP_ENV=production" >> .env
          echo "FRONTEND_PORT=3000" >> .env

      - name: Start stack (simulates existing prod)
        run: docker compose up -d --build

      - name: Wait for initial stack to be healthy
        run: |
          for i in $(seq 1 30); do
            if docker compose ps | grep -q "healthy"; then
              echo "Initial stack healthy"
              break
            fi
            sleep 3
          done

      - name: Rolling update — frontend
        run: |
          echo "Building new frontend image..."
          docker compose build frontend

          echo "Starting new frontend container..."
          docker compose up -d --no-deps --scale frontend=2 frontend || true

          echo "Waiting for new instance to pass healthcheck (max 60s)..."
          NEW_CONTAINER=$(docker compose ps -q frontend | head -1)
          for i in $(seq 1 12); do
            HEALTH=$(docker inspect --format='{{.State.Health.Status}}' "$NEW_CONTAINER" 2>/dev/null || echo "unknown")
            echo "Health: $HEALTH"
            if [ "$HEALTH" = "healthy" ]; then
              echo "New container is healthy — stopping old one"
              docker compose up -d --no-deps --scale frontend=1 frontend
              exit 0
            fi
            sleep 5
          done
          echo "New container did not become healthy within 60s — aborting, keeping old container"
          docker compose up -d --no-deps --scale frontend=1 frontend
          exit 1

      - name: Verify final stack status
        run: docker compose ps

      - name: Tear down after deploy simulation
        if: always()
        run: docker compose down -v
